<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Weather App</title>

    <link rel="stylesheet" href="src/index.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>

<body>
    <div class="weather-app">
        <header>
            <form class="search-form" id="search-form">
                <input type="search" id="search-input" class="search-form-input" placeholder="Enter city name..."
                    required />

                <input type="submit" value="Search" class="search-form-button" />
            </form>
        </header>

        <main>

            <div class="weather-app-data">

                <div>
                    <h1 class="weather-app-city" id="city"></h1>

                    <p class="weather-app-description">
                        <span id="time"></span>,
                        <span id="details"></span>
                        <br>

                        Humidity:
                        <strong id="humdity"></strong>,
                        Wind:
                        <strong id="wind-speed"></strong>
                    </p>
                </div>

                <div class="weather-app-temperature-container">

                    <div id="icon"></div>

                    <div class="weather-app-temperature-value" id="temperature">
                    </div>

                    <div class="weather-app-temperature-unit">
                        °C
                    </div>

                </div>

            </div>

        
            <div class="weather-forecast" id="forecast"></div>

        </main>

        <footer>
            Coded by
            <a href="https://github.com/shuduhadi" target="_blank">
                Shudu Hadi
            </a>,
            is
            <a href="https://github.com/shuduhadi/weather-app" target="_blank">
                open-sourced on GitHub
            </a>
            and
            <a href="https://swnweather1.netlify.app/" target="_blank">
                hosted on Netlify
            </a>
        </footer>

    </div>

    <script src="src/index.js"></script>
</body>

</html>
