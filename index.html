<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&family=Yuyu&display=swap" rel="stylesheet" href="src/index.css"/>
    <title>Weather App</title>
</head>
<body>
    <div class="weather-app">
    <header>
        <form class="search-form">
            <input type="search" placeholder="Enter city name..." required class="search-form-input"/>
            <input type="submit" value="Search" class="search-form-button"/>
        </form>
    </header>

    <main>
        <div class="weather-app-data">
        <div>
        <h1 class="weather-app-city">Paris</h1>
        <p class="weather-app-description">Tuesday 10:00, scattered clouds
            <br/>
            Humdity: <strong>60%</strong>, Wind: <strong>5 km/h</strong>
        </p>
        </div>
       <div class="weather-app-temperature-container"</div>
        <div class="weather-app-icon">🌤️</div>
        <div class="weather-app-temperature-value">12</div>
        <div class="weather-app-temperature-unit">°C</div>
        </div>
    </main>

    <footer>Coded by <a href="https://github.com/shuduhadi" target="_blank">Shudu Hadi</a>,
        is <a href="https://shuduhadi.github.io/weather-app/" target="_blank"> open-sourced on Github</a> and 
    <a href="https://swnweather1.netlify.app/" target="_blank"> hosted on Netlify</a>
    </footer>
    </div>
</body>
</html>
